name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags=linux -run TestOpenTestFixtures ./internal/cli/...

  integration-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags=darwin -run TestOpenTestFixtures ./internal/cli/...

  integration-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -tags=windows -run TestOpenTestFixtures ./internal/cli/...

  validate-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run ./cmd/dfx profile validate internal/cli/testdata/example.json || true
