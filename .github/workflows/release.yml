name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          mkdir -p dist
          binary="dfx"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary="${binary}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X github.com/LukasParke/dfx/internal/cli.Version=${GITHUB_REF_NAME}" \
            -o "dist/${binary}" ./cmd/dfx
      - name: Create archive
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "dfx_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.zip" "${binary}"
          else
            tar czf "dfx_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" "${binary}"
          fi
        env:
          binary: ${{ matrix.goos == 'windows' && 'dfx.exe' || 'dfx' }}
      - uses: actions/upload-artifact@v4
        with:
          name: dfx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/dfx_*.tar.gz
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        with:
          name: dfx-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: dist/dfx_*.zip
          if-no-files-found: ignore

  build-darwin:
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 \
            go build -trimpath -ldflags="-s -w -X github.com/LukasParke/dfx/internal/cli.Version=${GITHUB_REF_NAME}" \
            -o "dist/dfx" ./cmd/dfx
      - name: Create archive
        run: |
          cd dist
          tar czf "dfx_${GITHUB_REF_NAME}_darwin_${{ matrix.goarch }}.tar.gz" "dfx"
      - uses: actions/upload-artifact@v4
        with:
          name: dfx-darwin-${{ matrix.goarch }}
          path: dist/dfx_*.tar.gz

  release:
    needs: [build-linux-windows, build-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum dfx_* > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
